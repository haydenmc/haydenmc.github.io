---
layout: default
---
<main>
    <header>
        <h2><a href="{% link index.html %}">Hayden/</a></h2>
        <h1>Recipes</h1>
    </header>
    {% for recipe in site.recipes %}
        <article>
            <header>
                <div>
                    <h1><a href="{{ recipe.url }}">{{ recipe.title }}</a></h1>
                    <time>{{ recipe.date | date: "%Y-%m-%d" }}</time>
                </div>
            </header>
            {{ recipe.excerpt }}
        </article>
    {% endfor %}
</main>
